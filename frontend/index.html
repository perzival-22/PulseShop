    <meta name="description" content="PulseShop — social-commerce storefront. Browse, favorite, and order in one tap." />

    <!-- iOS ignores the web manifest entirely: without these, "Add to Home
         Screen" saves a bookmark that opens in a Safari tab with the address
         bar, using a screenshot of the page as its icon. These are what make it
         launch full-screen with the real logo, and they have no Android effect. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="PulseShop" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <title>PulseShop</title>
  </head>
