<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#e0f4f9" />
      <stop offset="100%" stop-color="#bce3ed" />
    </radialGradient>

    <!-- Cart Body Gradient -->
    <linearGradient id="cartGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#69737a" />
      <stop offset="100%" stop-color="#49555c" />
    </linearGradient>

    <!-- Pulse Line Gradient -->
    <linearGradient id="pulseGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0bd4cc" />
      <stop offset="50%" stop-color="#00a39a" />
      <stop offset="100%" stop-color="#0bd4cc" />
    </linearGradient>

    <!-- Speed Line Gradient -->
    <linearGradient id="speedLineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0)" />
      <stop offset="50%" stop-color="rgba(255,255,255,0.8)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0)" />
    </linearGradient>

    <!-- Teal Speed Line Gradient -->
    <linearGradient id="tealSpeedGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(0,163,154,0)" />
      <stop offset="50%" stop-color="rgba(0,163,154,0.6)" />
      <stop offset="100%" stop-color="rgba(0,163,154,0)" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Intense Glow Filter for Lens Flare -->
    <filter id="intenseGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bgGradient)" />

  <!-- Ground Shadow -->
  <ellipse cx="420" cy="580" rx="280" ry="15" fill="#88b5be" opacity="0.6" />

  <!-- White Speed Lines (Background) -->
  <rect x="0" y="100" width="350" height="4" fill="url(#speedLineGradient)" />
  <rect x="0" y="140" width="450" height="6" fill="url(#speedLineGradient)" />
  <rect x="0" y="240" width="550" height="5" fill="url(#speedLineGradient)" />
  <rect x="0" y="420" width="400" height="4" fill="url(#speedLineGradient)" />
  <rect x="0" y="480" width="600" height="8" fill="url(#speedLineGradient)" />
  <rect x="0" y="550" width="450" height="5" fill="url(#speedLineGradient)" />

  <!-- Teal Speed Lines (Background) -->
  <rect x="0" y="120" width="250" height="3" fill="url(#tealSpeedGradient)" />
  <rect x="0" y="280" width="300" height="4" fill="url(#tealSpeedGradient)" />
  <rect x="0" y="450" width="200" height="3" fill="url(#tealSpeedGradient)" />
  <rect x="0" y="520" width="350" height="4" fill="url(#tealSpeedGradient)" />

  <!-- Shopping Cart Background Panel (Left) -->
  <path d="M 270 170 L 320 390 L 400 390 L 400 170 Z" fill="url(#cartGradient)" />

  <!-- Shopping Cart Background Panel (Right) -->
  <path d="M 420 170 L 420 390 L 680 390 L 720 170 Z" fill="#00968f" />

  <!-- Shopping Cart Handle and Frame -->
  <!-- Main Handle Bar -->
  <path d="M 120 70 L 210 70 L 270 160 L 320 370" fill="none" stroke="#37454c" stroke-width="25" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Horizontal Frame Bars (Speed effect) -->
  <path d="M 50 180 L 150 180" fill="none" stroke="#00837d" stroke-width="15" stroke-linecap="round" />
  <path d="M 110 180 L 180 180" fill="none" stroke="#00837d" stroke-width="15" stroke-linecap="round" />
  <path d="M 170 180 L 230 180" fill="none" stroke="#00837d" stroke-width="15" stroke-linecap="round" />

  <path d="M 130 230 L 280 230" fill="none" stroke="#37454c" stroke-width="20" stroke-linecap="round" />
  <path d="M 170 320 L 300 320" fill="none" stroke="#37454c" stroke-width="20" stroke-linecap="round" />

  <path d="M 150 370 L 220 370" fill="none" stroke="#00837d" stroke-width="15" stroke-linecap="round" />
  <path d="M 210 370 L 270 370" fill="none" stroke="#00837d" stroke-width="15" stroke-linecap="round" />

  <!-- Cart Bottom Frame -->
  <path d="M 310 390 L 670 390 L 690 390 C 720 390 730 410 710 430 C 690 450 670 440 650 440 L 340 440 C 300 440 280 470 300 500 L 660 500 L 690 500" fill="none" stroke="#37454c" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Wheels -->
  <!-- Left Wheel Outer -->
  <circle cx="360" cy="545" r="30" fill="#37454c" />
  <!-- Left Wheel Inner -->
  <circle cx="360" cy="545" r="10" fill="#f0f8fa" />

  <!-- Right Wheel Outer -->
  <circle cx="580" cy="545" r="30" fill="#37454c" />
  <!-- Right Wheel Inner -->
  <circle cx="580" cy="545" r="10" fill="#f0f8fa" />

  <!-- Pulse Line (White Background/Outline) -->
  <path d="M 220 280 L 400 280 L 430 220 L 460 360 L 510 100 L 550 410 L 580 250 L 620 280 L 730 280" fill="none" stroke="#ffffff" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Pulse Line (Teal Foreground) -->
  <path d="M 220 280 L 400 280 L 430 220 L 460 360 L 510 100 L 550 410 L 580 250 L 620 280 L 730 280" fill="none" stroke="url(#pulseGradient)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Lens Flares / Lighting Highlights -->
  <!-- Major Flare Right -->
  <ellipse cx="740" cy="280" rx="60" ry="20" fill="#ffffff" filter="url(#intenseGlow)" opacity="0.8" />
  <circle cx="740" cy="280" r="30" fill="#ffffff" filter="url(#glow)" />

  <!-- Highlights on Pulse Line -->
  <ellipse cx="490" cy="380" rx="30" ry="10" fill="#ffffff" filter="url(#glow)" opacity="0.6" />
  <ellipse cx="650" cy="280" rx="40" ry="8" fill="#ffffff" filter="url(#glow)" opacity="0.9" />
  <ellipse cx="250" cy="280" rx="30" ry="6" fill="#ffffff" filter="url(#glow)" opacity="0.8" />

  <!-- Highlight on Cart Top -->
  <ellipse cx="630" cy="170" rx="40" ry="10" fill="#ffffff" filter="url(#glow)" opacity="0.7" />

  <!-- Wheel Highlights -->
  <ellipse cx="330" cy="545" rx="15" ry="5" fill="#ffffff" filter="url(#glow)" opacity="0.8" />
  <ellipse cx="550" cy="545" rx="15" ry="5" fill="#ffffff" filter="url(#glow)" opacity="0.8" />

  <!-- Speed Lines over elements -->
  <rect x="150" y="278" width="150" height="4" fill="#ffffff" filter="url(#glow)" opacity="0.9" />
  <rect x="300" y="160" width="120" height="3" fill="#ffffff" filter="url(#glow)" opacity="0.5" />

  <!-- Text: PulseShop -->
  <text x="400" y="740" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="600" font-size="110" fill="#37454c" text-anchor="middle" letter-spacing="-2">
    Pulse<tspan font-weight="600" fill="#37454c">Shop</tspan>
  </text>
</svg>
